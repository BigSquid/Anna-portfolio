<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anna Macherkevich — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Kalnia:wght@300;400;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --blue:        #225991;
    --blue-dark:   #1a4470;
    --blue-mid:    #2e6fad;
    --blue-light:  #7a9fd4;
    --blue-ghost:  #d0ddf0;
    --white:       #ffffff;
    --cream:       #f0ead8;
    --ink:         #0e1a2e;
    --muted:       rgba(255,255,255,0.55);
    --border:      rgba(255,255,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--blue);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    color: var(--white);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    overflow: hidden;
  }

  /* Background name watermark */
  .bg-name {
    position: fixed;
    bottom: -40px;
    left: -20px;
    font-family: 'Kalnia', serif;
    font-size: clamp(80px, 18vw, 220px);
    font-weight: 700;
    color: rgba(255,255,255,0.045);
    line-height: 0.88;
    letter-spacing: -0.02em;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    background: var(--blue-dark);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 52px 48px 48px;
    box-shadow: 0 40px 100px rgba(14,26,46,0.55);
    animation: rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--blue-light);
    font-weight: 500;
    margin-bottom: 20px;
    opacity: 0;
    animation: fade 0.5s 0.15s ease both;
  }

  .title {
    font-family: 'Kalnia', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
    opacity: 0;
    animation: fade 0.5s 0.2s ease both;
  }

  .subtitle {
    font-size: 14px;
    line-height: 1.75;
    color: rgba(255,255,255,0.55);
    margin-bottom: 36px;
    opacity: 0;
    animation: fade 0.5s 0.25s ease both;
  }

  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 32px;
    opacity: 0;
    animation: fade 0.5s 0.3s ease both;
  }

  /* Password input */
  .input-group {
    position: relative;
    margin-bottom: 12px;
    opacity: 0;
    animation: fade 0.5s 0.35s ease both;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--blue-light);
    font-weight: 500;
    display: block;
    margin-bottom: 8px;
  }

  .password-wrap {
    position: relative;
  }

  input[type="password"],
  input[type="text"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 14px 48px 14px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 0.04em;
  }

  input[type="password"]::placeholder,
  input[type="text"]::placeholder {
    color: rgba(255,255,255,0.22);
  }

  input:focus {
    border-color: var(--blue-light);
    background: rgba(255,255,255,0.09);
  }

  input.error {
    border-color: #e07070;
    animation: shake 0.35s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    60%      { transform: translateX(6px); }
    80%      { transform: translateX(-3px); }
  }

  .toggle-pw {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.3);
    padding: 4px;
    transition: color 0.2s;
    display: flex;
    align-items: center;
  }
  .toggle-pw:hover { color: rgba(255,255,255,0.7); }

  .error-msg {
    font-size: 12px;
    color: #e07070;
    margin-top: 8px;
    height: 16px;
    transition: opacity 0.2s;
    opacity: 0;
  }
  .error-msg.visible { opacity: 1; }

  /* Enter button */
  .btn-enter {
    width: 100%;
    background: var(--blue-light);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 15px 24px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    opacity: 0;
    animation: fade 0.5s 0.4s ease both;
  }

  .btn-enter:hover { opacity: 0.88; }
  .btn-enter:active { transform: scale(0.98); }

  .btn-enter.loading .btn-text { opacity: 0; }
  .btn-enter.loading::after {
    content: '';
    width: 16px; height: 16px;
    border: 2px solid rgba(14,26,46,0.3);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    position: absolute;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Separator */
  .or-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 0;
    opacity: 0;
    animation: fade 0.5s 0.45s ease both;
  }
  .or-line { flex: 1; height: 1px; background: var(--border); }
  .or-text {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }

  /* Request access section */
  .request-section {
    margin-top: 24px;
    opacity: 0;
    animation: fade 0.5s 0.5s ease both;
  }

  .request-label {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 12px;
    line-height: 1.6;
  }

  .request-row {
    display: flex;
    gap: 8px;
  }

  input[type="email"] {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input[type="email"]::placeholder { color: rgba(255,255,255,0.22); }
  input[type="email"]:focus {
    border-color: var(--blue-light);
    background: rgba(255,255,255,0.09);
  }

  .btn-request {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px 18px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-request:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.3);
    color: var(--white);
  }

  .request-success {
    display: none;
    font-size: 13px;
    color: #7acba8;
    margin-top: 10px;
    align-items: center;
    gap: 6px;
  }
  .request-success.visible { display: flex; }

  /* Footer */
  .card-footer {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.06em;
    text-align: center;
    opacity: 0;
    animation: fade 0.5s 0.55s ease both;
  }

  @media (max-width: 480px) {
    .card { padding: 40px 28px 36px; }
    .title { font-size: 26px; }
    .request-row { flex-direction: column; }
    .btn-request { width: 100%; }
  }
</style>
</head>
<body>

  <div class="bg-name">ANNA<br>MACHER<br>KEVICH</div>

  <div class="card">
    <div class="eyebrow">Portfolio · Protected</div>
    <h1 class="title">ANNA <span style="color: var(--blue-light);">MACHERKEVICH</span></h1>
    <p class="subtitle">Product Designer / Doodler — San Francisco</p>

    <div class="divider"></div>

    <!-- Password form -->
    <div class="input-group">
      <label class="input-label" for="pw-input">Password</label>
      <div class="password-wrap">
        <input type="password" id="pw-input" placeholder="Enter password to continue" autocomplete="current-password" />
        <button class="toggle-pw" id="toggle-pw" type="button" aria-label="Show password">
          <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="error-msg" id="error-msg">Incorrect password — try again</div>
    </div>

    <button class="btn-enter" id="btn-enter" type="button">
      <span class="btn-text">Enter Portfolio ↗</span>
    </button>

    <!-- Or divider -->
    <div class="or-row">
      <div class="or-line"></div>
      <span class="or-text">or</span>
      <div class="or-line"></div>
    </div>

    <!-- Request access -->
    <div class="request-section">
      <p class="request-label">Don't have the password? Leave your email and I'll be in touch.</p>
      <div class="request-row">
        <input type="email" id="email-input" placeholder="your@email.com" />
        <button class="btn-request" id="btn-request" type="button">Request Access</button>
      </div>
      <div class="request-success" id="request-success">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7acba8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Request sent — I'll get back to you soon!
      </div>
    </div>

    <div class="card-footer">annamacherkevich.com</div>
  </div>

<script>
  // ── CONFIGURATION ──────────────────────────────────────────
  const PASSWORD       = 'YOUR_PASSWORD_HERE';       // ← change this
  const REDIRECT_URL   = 'index.html';               // ← your portfolio filename
  const YOUR_EMAIL     = 'annamacherkevich@gmail.com'; // ← your email
  // ───────────────────────────────────────────────────────────

  const input     = document.getElementById('pw-input');
  const btnEnter  = document.getElementById('btn-enter');
  const errorMsg  = document.getElementById('error-msg');
  const toggleBtn = document.getElementById('toggle-pw');
  const eyeIcon   = document.getElementById('eye-icon');

  // Enter on keypress
  input.addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
  btnEnter.addEventListener('click', checkPassword);

  function checkPassword() {
    const val = input.value.trim();
    if (!val) return;

    btnEnter.classList.add('loading');
    errorMsg.classList.remove('visible');
    input.classList.remove('error');

    setTimeout(() => {
      btnEnter.classList.remove('loading');
      if (val === PASSWORD) {
        // Store in session so user isn't re-prompted on reload
        sessionStorage.setItem('portfolio_auth', 'true');
        window.location.href = REDIRECT_URL;
      } else {
        input.classList.add('error');
        errorMsg.classList.add('visible');
        input.value = '';
        input.focus();
      }
    }, 400);
  }

  // Toggle password visibility
  toggleBtn.addEventListener('click', () => {
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    eyeIcon.innerHTML = isText
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  });

  // Request access — sends via mailto
  document.getElementById('btn-request').addEventListener('click', () => {
    const email = document.getElementById('email-input').value.trim();
    if (!email || !email.includes('@')) {
      document.getElementById('email-input').style.borderColor = '#e07070';
      setTimeout(() => document.getElementById('email-input').style.borderColor = '', 1500);
      return;
    }

    const subject = encodeURIComponent('Portfolio Access Request');
    const body    = encodeURIComponent(`Hi Anna,\n\nI'd love to view your portfolio.\n\nMy email: ${email}\n\nThanks!`);
    window.location.href = `mailto:${YOUR_EMAIL}?subject=${subject}&body=${body}`;

    document.getElementById('request-success').classList.add('visible');
    document.getElementById('email-input').value = '';
  });

  // If already authenticated this session, skip gate
  if (sessionStorage.getItem('portfolio_auth') === 'true') {
    window.location.href = REDIRECT_URL;
  }
</script>

</body>
</html>
